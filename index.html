  <script>
  window.onerror = function(msg, src, line) {
    document.getElementById('root').innerHTML =
      '<div style="color:#C8A84B;padding:24px;font-family:monospace;font-size:12px;background:#0a0710;min-height:100vh;">' +
      '<div style="font-size:16px;margin-bottom:16px;">ERROR</div>' + msg + '<br><br>Line: ' + line + '</div>';
    return true;
  };
  window.storage = {
    get: (k) => { try { const v=localStorage.getItem(k); return Promise.resolve(v?{key:k,value:v}:null); } catch(e){return Promise.resolve(null);} },
    set: (k,v) => { try { localStorage.setItem(k,v); return Promise.resolve({key:k,value:v}); } catch(e){return Promise.resolve(null);} },
    delete: (k) => { try { localStorage.removeItem(k); return Promise.resolve({key:k,deleted:true}); } catch(e){return Promise.resolve(null);} }
  };
  </script>

const ENOCH_TEXT = {
    1: { title: "The Blessing of Enoch", text: `1. The words of the blessing of Enoch, wherewith he blessed the elect and righteous, who will be living in the day of tribulation, when all the wicked and godless are to be removed.\n\n2. And he took up his parable and said: Enoch a righteous man, whose eyes were opened by God, saw the vision of the Holy One in the heavens, which the angels showed me, and from them I heard everything, and from them I understood as I saw, but not for this generation, but for a remote one which is for to come.\n\n3. Concerning the elect I said, and took up my parable concerning them: The Holy Great One will come forth from His dwelling,\n4. And the eternal God will tread upon the earth, even on Mount Sinai, and appear from His camp and appear in the strength of His might from the heaven of heavens.\n\n5. And all shall be smitten with fear, and the Watchers shall quake, and great fear and trembling shall seize them unto the ends of the earth.\n\n6. And the high mountains shall be shaken, and the high hills shall be made low, and shall melt like wax before the flame.\n\n7. And the earth shall be wholly rent in sunder, and all that is upon the earth shall perish, and there shall be a judgement upon all.\n\n8. But with the righteous He will make peace, and will protect the elect, and mercy shall be upon them. And they shall all belong to God, and they shall be prospered, and they shall all be blessed. And He will help them all, and light shall appear unto them, and He will make peace with them.` },
    2: { title: "The Watchers", text: `1. And it came to pass when the children of men had multiplied that in those days were born unto them beautiful and comely daughters.\n\n2. And the angels, the children of the heaven, saw and lusted after them, and said to one another: Come, let us choose us wives from among the children of men and beget us children.\n\n3. And Semjaza, who was their leader, said unto them: I fear ye will not indeed agree to do this deed, and I alone shall have to pay the penalty of a great sin.\n\n4. And they all answered him and said: Let us all swear an oath, and all bind ourselves by mutual imprecations not to abandon this plan but to do this thing.\n\n5. Then sware they all together and bound themselves by mutual imprecations upon it.\n\n6. And they were in all two hundred; who descended in the days of Jared on the summit of Mount Hermon, and they called it Mount Hermon, because they had sworn and bound themselves by mutual imprecations upon it.\n\n7. And these are the names of their leaders: Samlazaz, their leader, Araklba, Rameel, Kokablel, Tamlel, Ramlel, Danel, Ezeqeel, Baraqijal, Asael, Armaros, Batarel, Ananel, Zaqiel, Samsapeel, Satarel, Turel, Jomjael, Sariel. These are their chiefs of tens.` },
    6: { title: "The Giants and Corruption", text: `1. And all the others together with them took unto themselves wives, and each chose for himself one, and they began to go in unto them and to defile themselves with them, and they taught them charms and enchantments, and the cutting of roots, and made them acquainted with plants.\n\n2. And they became pregnant, and they bare great giants, whose height was three thousand ells:\n\n3. Who consumed all the acquisitions of men. And when men could no longer sustain them,\n\n4. The giants turned against them and devoured mankind.\n\n5. And they began to sin against birds, and beasts, and reptiles, and fish, and to devour one anothers flesh, and drink the blood.\n\n6. Then the earth laid accusation against the lawless ones.` },
    14: { title: "The Heavenly Temple", text: `8. And the visions were shown to me thus: Behold, in the vision clouds invited me and a mist summoned me, and the course of the stars and the lightnings sped and hastened me, and the winds in the vision caused me to fly and lifted me upward, and bore me into heaven.\n\n9. And I went in till I drew nigh to a wall which is built of crystals and surrounded by tongues of fire: and it began to affright me.\n\n10. And I went into the tongues of fire and drew nigh to a large house which was built of crystals: and the walls of the house were like a tesselated floor made of crystals, and its groundwork was of crystal.\n\n11. Its ceiling was like the path of the stars and the lightnings, and between them were fiery cherubim, and their heaven was water.\n\n12. A flaming fire surrounded the walls, and its portals blazed with fire.\n\n13. And I entered into that house, and it was hot as fire and cold as ice: there were no delights of life therein: fear covered me, and trembling got hold upon me.\n\n14. And as I quaked and trembled, I fell upon my face.\n\n15. And I beheld a vision, And lo! there was a second house, greater than the former, and the entire portal stood open before me, and it was built of flames of fire.` },
